name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          lean4checker: true

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run serde_json roundtrip tests
        working-directory: conformance
        run: cargo run -- roundtrip

      - name: Run escaping tests
        working-directory: conformance
        run: cargo run -- escaping

      - name: Run Nickel conformance tests
        working-directory: conformance
        run: cargo run -- nickel
